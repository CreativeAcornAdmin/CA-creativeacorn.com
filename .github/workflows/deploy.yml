name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Check dist
        run: ls -la dist/ && ls -la dist/assets/
        continue-on-error: true

      - name: Check secrets length
        run: |
          echo "CF token length: ${#CLOUDFLARE_API_TOKEN}"
          echo "CF account ID: $CLOUDFLARE_ACCOUNT_ID"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true

      - name: Install wrangler
        run: npm install -g wrangler
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=creativeacorn-com 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
